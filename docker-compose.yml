services:
  backend:
    build: ./backend
    container_name: family-hero-hub-backend
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    ports:
      - "10.250.50.5:8000:8000"
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  notification_scheduler:
    build: ./backend
    container_name: family-hero-hub-notification-scheduler
    volumes:
      - ./data:/app/data
    env_file:
      - .env
      - .env.push
    command: ["python", "-m", "app.messaging_notification_worker"]
    restart: unless-stopped

  messaging_production_worker:
    build: ./backend
    container_name: class-hero-hub-messaging-production-worker
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    command: ["python", "-m", "app.messaging_production_worker"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: family-hero-hub-frontend
    env_file:
      - .env
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    build:
      context: ./postgres
    container_name: family-hero-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_hero_hub}
      POSTGRES_USER: ${POSTGRES_USER:-familyhero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=pgbackrest --stanza=fhh archive-push %p
      - -c
      - max_wal_senders=3
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pgbackrest_repo:/var/lib/pgbackrest
      - ./postgres/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-familyhero} -d ${POSTGRES_DB:-family_hero_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_restore:
    build:
      context: ./postgres
    container_name: family-hero-hub-postgres-restore
    restart: "no"
    profiles:
      - restore
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_hero_hub}
      POSTGRES_USER: ${POSTGRES_USER:-familyhero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_restore_data:/var/lib/postgresql/data
      - pgbackrest_repo:/var/lib/pgbackrest
      - ./postgres/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-familyhero} -d ${POSTGRES_DB:-family_hero_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_restore_data:
  pgbackrest_repo:
