services:
  backend:
    build: ./backend
    container_name: family-hero-hub-backend
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: family-hero-hub-frontend
    env_file:
      - .env
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
