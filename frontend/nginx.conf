server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    location = /_app/version.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ^~ /_app/immutable/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /avatars/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location ^~ /pets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /family-hero-hub-logo.png {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /app-icon.png {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }
}
